<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GyanTuner - Secure Gateway 🧠</title>
    <style>
        /* ================= PREMIUM MODERN SPLIT LAYER CORE ================= */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            background: #eef2f6;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        /* 🏠 ULTRA-ATTRACTIVE FLOATING GO BACK BUTTON LINK DOCK */
        .floating-back-anchor {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #ffffff;
            padding: 12px 24px;
            border-radius: 50px;
            color: #1e3a8a;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(30, 58, 138, 0.06);
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            cursor: pointer;
        }

        .floating-back-anchor svg {
            width: 18px; height: 18px; fill: none; stroke: #1e3a8a;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
            transition: transform 0.3s ease;
        }

        .floating-back-anchor:hover {
            background: #1e3a8a; color: #ffffff; border-color: #1e3a8a;
            transform: translateY(-2px); box-shadow: 0 12px 28px rgba(30, 58, 138, 0.2);
        }

        .floating-back-anchor:hover svg { stroke: #ffffff; transform: translateX(-4px); }

        /* 👑 HIGH-FIDELITY MAIN VIEWPORT CARD FRAME */
        .master-auth-card {
            background: #ffffff;
            width: 100%; max-width: 1024px; min-height: 640px;
            border-radius: 28px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.08);
            display: flex; overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: cardEntranceSmooth 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        @keyframes cardEntranceSmooth {
            0% { transform: translateY(24px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* ================= 📝 LEFT SIDE PANEL: SHARP HIGH-CONTRAST INPUTS ================= */
        .auth-fields-section {
            flex: 1.1; background: #ffffff;
            padding: 50px 65px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* Dynamic Header Identity Hub with Embedded PNG Logo Layout */
        .brand-identity-hub {
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
        }
        .brand-identity-hub img { width: 44px; height: 44px; object-fit: contain; border-radius: 10px; }
        .brand-identity-hub .brand-text { font-size: 1.8rem; font-weight: 800; color: #1e3a8a; letter-spacing: -0.6px; }

        .auth-fields-section h2 {
            font-size: 2.2rem; font-weight: 700; color: #000000;
            margin-bottom: 25px; letter-spacing: -0.8px;
        }

        /* Mode Selection Tab bar links mapping */
        .mode-tab-bar {
            display: flex; gap: 20px; margin-bottom: 25px;
            border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;
        }
        .tab-trigger-btn {
            background: transparent; border: none; font-size: 1rem;
            font-weight: 700; color: #94a3b8; cursor: pointer;
            padding: 4px 0; position: relative; transition: color 0.2s ease;
        }
        .tab-trigger-btn.active { color: #1e3a8a; }
        .tab-trigger-btn.active::after {
            content: ''; position: absolute; bottom: -12px; left: 0;
            width: 100%; height: 3px; background: #1e3a8a; border-radius: 50px;
        }

        /* Interactive active state forms blocks visibility loop */
        .auth-interactive-form { display: none; flex-direction: column; gap: 16px; }
        .auth-interactive-form.active { display: flex; }

        /* 📦 ULTRA-VISIBLE CRISP BOX FIELD CELLS SYSTEM */
        .form-input-block { display: flex; flex-direction: column; gap: 6px; position: relative; }
        .form-input-block label { font-size: 0.9rem; font-weight: 700; color: #0f172a; }
        
        .form-input-block input {
            padding: 14px 18px; 
            border: 2px solid #cbd5e1; 
            border-radius: 10px;
            font-size: 1rem; outline: none; 
            background: #ffffff; color: #0f172a; font-weight: 600;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .form-input-block input:focus {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }

        /* 🔒 PREMIUM OTP DISPLAY ROW LAYER */
        .otp-input-wrapper {
            position: relative; display: flex; align-items: center; width: 100%;
        }
        .otp-input-wrapper input { padding-left: 48px; width: 100%; }
        .otp-icon-svg {
            position: absolute; left: 16px; width: 20px; height: 20px;
            fill: none; stroke: #64748b; stroke-width: 2;
        }

        /* Checkbox Layout mechanics alignment */
        .policy-agreement-row {
            display: flex; align-items: center; gap: 10px; margin-top: 4px;
            font-size: 0.85rem; color: #475569; font-weight: 600;
        }
        .policy-agreement-row input { width: 16px; height: 16px; accent-color: #1e3a8a; cursor: pointer; }
        .policy-agreement-row a { color: #1e3a8a; text-decoration: none; font-weight: 700; }

        /* Solid action controller button */
        .action-submit-btn {
            background: #1e3a8a; color: #ffffff; border: none;
            padding: 15px; border-radius: 10px; font-size: 1.05rem;
            font-weight: 700; cursor: pointer; margin-top: 8px;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.15);
            transition: all 0.2s ease;
        }
        .action-submit-btn:hover { background: #0f172a; transform: translateY(-1px); }

        /* Dynamic Toggle Text Footer Link */
        .switch-auth-mode-footer {
            text-align: center; margin-top: 15px; font-size: 0.9rem; font-weight: 600; color: #64748b;
        }
        .switch-auth-mode-footer span { color: #1e3a8a; cursor: pointer; font-weight: 700; text-decoration: underline; }

        .content-split-divider {
            display: flex; align-items: center; margin: 20px 0;
            color: #94a3b8; font-size: 0.85rem; font-weight: 700;
        }
        .content-split-divider::before, .content-split-divider::after { content: ""; flex: 1; height: 2px; background: #f1f5f9; }
        .content-split-divider span { padding: 0 12px; }

        /* Providers Grid Panels */
        .oauth-providers-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
        .oauth-provider-node {
            background: #ffffff; border: 2px solid #cbd5e1; border-radius: 10px;
            padding: 13px; font-size: 0.98rem; font-weight: 700; color: #1e293b;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 12px; transition: all 0.2s ease;
        }
        .oauth-provider-node:hover { background: #f8fafc; border-color: #94a3b8; }
        .oauth-provider-node img { width: 20px; height: 20px; object-fit: contain; }

        #recaptcha-container { margin-top: 2px; }

        /* ================= 🎨 RIGHT SIDE PANEL: CUSTOM VECTOR SPACE ALIVE DOCK ================= */
        .auth-graphics-section {
            flex: 0.9; background: #f1f5f9; display: flex; justify-content: center; align-items: center;
            position: relative; border-left: 2px solid #e2e8f0;
        }
        .canvas-viewport-shell { width: 100%; height: 100%; min-height: 480px; display: flex; justify-content: center; align-items: center; position: relative; }

        .live-custom-avatar-shell {
            width: 240px; height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            position: relative; z-index: 5; animation: characterBreathingMicroJump 3.5s ease-in-out infinite;
        }
        @keyframes characterBreathingMicroJump {
            0%, 100% { transform: translateY(0px) scaleX(1) scaleY(1); }
            50% { transform: translateY(-14px) scaleX(0.98) scaleY(1.03); }
        }

        .mesh-body-base { 
            width: 170px; height: 180px; background: linear-gradient(135deg, #1e3a8a, #111827); border-radius: 55% 55% 45% 45%; 
            position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 20px 45px rgba(30, 58, 138, 0.25); 
        }
        .mesh-face-eyes { display: flex; gap: 24px; position: absolute; top: 55px; left: 38px; transition: all 0.08s ease-out; }
        .socket-orbit-circle { width: 44px; height: 44px; background: #ffffff; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: inset 0 2px 8px rgba(0,0,0,0.15); }
        .pupil-dark-dot { width: 20px; height: 20px; background: #0f172a; border-radius: 50%; position: absolute; display: flex; justify-content: center; align-items: center; transition: transform 0.01s linear; }
        .pupil-dark-dot::after { content: ''; position: absolute; top: 3px; left: 3px; width: 5px; height: 5px; background: #ffffff; border-radius: 50%; }

        .tentacles-dock { display: flex; gap: 8px; margin-top: -6px; z-index: -1; }
        .tentacle-leg { width: 22px; height: 45px; background: #1e3a8a; border-radius: 0 0 15px 15px; animation: legWiggleMove 1.8s ease-in-out infinite alternate; transform-origin: top center; }
        .tentacle-leg:nth-child(2) { animation-delay: 0.3s; background: #111827; }
        .tentacle-leg:nth-child(3) { animation-delay: 0.6s; background: #1e3a8a; }
        @keyframes legWiggleMove { 0% { transform: rotate(-8deg) translateY(0); } 100% { transform: rotate(12deg) translateY(-2px); } }
    </style>
</head>
<body>

    <a href="index.html" class="floating-back-anchor">
        <svg viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Go Back
    </a>

    <div class="master-auth-card">
        
        <div class="auth-fields-section">
            <div class="brand-identity-hub" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <img src="images/logo.png" alt="GyanTuner Logo">
                <span class="brand-text">GyanTuner</span>
            </div>

            <h2 id="mainFormTitle">Get Started Now</h2>

            <div class="mode-tab-bar">
                <button class="tab-trigger-btn active" id="tabEmail" onclick="toggleAuthGate('email')">Email Gateway</button>
                <button class="tab-trigger-btn" id="tabPhone" onclick="toggleAuthGate('phone')">Phone Verification</button>
            </div>

            <form class="auth-interactive-form active" id="emailGatewayForm" onsubmit="executeEmailPipeline(event)">
                <div class="form-input-block" id="nameFieldGroup">
                    <label>Name</label>
                    <input type="text" id="nameInput" placeholder="Enter your name">
                </div>
                <div class="form-input-block">
                    <label>Email address</label>
                    <input type="email" id="emailInput" placeholder="Enter your email" required>
                </div>
                <div class="form-input-block">
                    <label>Password</label>
                    <input type="password" id="passwordInput" placeholder="Enter your password" required>
                </div>
                <div class="policy-agreement-row" id="policyFieldGroup">
                    <input type="checkbox" id="policyCheck">
                    <label for="policyCheck">I agree to the <a href="#">terms & policy</a></label>
                </div>
                <button type="submit" class="action-submit-btn" id="emailSubmitBtn">Signup</button>
            </form>

            <form class="auth-interactive-form" id="phoneGatewayForm" onsubmit="executePhonePipeline(event)">
                <div class="form-input-block">
                    <label>Phone Number</label>
                    <input type="tel" id="phoneInput" placeholder="+91 98765 43210" required>
                </div>
                <div id="recaptcha-container"></div>
                
                <div class="form-input-block" id="otpInputGroup" style="display: none; margin-top: 12px;">
                    <label>Enter 6-Digit OTP</label>
                    <div class="otp-input-wrapper">
                        <svg class="otp-icon-svg" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="text" id="otpInput" placeholder="123456" maxlength="6">
                    </div>
                </div>
                <button type="submit" class="action-submit-btn" id="phoneExecutionBtn">Send OTP Code 📩</button>
            </form>

            <div class="content-split-divider"><span>Or</span></div>

            <div class="oauth-providers-grid">
                <button class="oauth-provider-node" onclick="executeGooglePipeline()">
                    <img src="https://img.icons8.com/color/48/google-logo.png" alt="Google">
                    Sign in with Google
                </button>
            </div>

            <div class="switch-auth-mode-footer" id="toggleAuthFooter">
                Already have an account? <span onclick="switchAuthFlowMode('signin')">Sign In</span>
            </div>
        </div>

        <div class="auth-graphics-section">
            <div class="canvas-viewport-shell">
                <div class="live-custom-avatar-shell" id="liveAvatarContainer">
                    <div class="mesh-body-base">
                        <div class="mesh-face-eyes" id="liveFaceLayer">
                            <div class="socket-orbit-circle"><div class="pupil-dark-dot"></div></div>
                            <div class="socket-orbit-circle"><div class="pupil-dark-dot"></div></div>
                        </div>
                    </div>
                    <div class="tentacles-dock">
                        <div class="tentacle-leg"></div><div class="tentacle-leg"></div><div class="tentacle-leg"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQAcqvewHftBqWN8Kzn1tTHVihQi_UC7w",
            authDomain: "gyantuner-c7919.firebaseapp.com",
            projectId: "gyantuner-c7919",
            storageBucket: "gyantuner-c7919.firebasestorage.app",
            messagingSenderId: "772296086850",
            appId: "1:772296086850:web:22308c20d3a8bd06f0a4db"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        let phoneVerificationToken = null;
        let currentFlow = "signup"; // Mode storage tracker

        // 🔄 SMART ACCOUNT TYPE TOGGLER FUNCTION
        window.switchAuthFlowMode = function(mode) {
            const title = document.getElementById('mainFormTitle');
            const nameField = document.getElementById('nameFieldGroup');
            const policyField = document.getElementById('policyFieldGroup');
            const emailBtn = document.getElementById('emailSubmitBtn');
            const footer = document.getElementById('toggleAuthFooter');

            if(mode === 'signin') {
                currentFlow = "signin";
                title.innerText = "Welcome Back";
                nameField.style.display = "none";
                policyField.style.display = "none";
                document.getElementById('nameInput').removeAttribute('required');
                emailBtn.innerText = "Sign In";
                footer.innerHTML = `New to GyanTuner? <span onclick="switchAuthFlowMode('signup')">Create Account</span>`;
            } else {
                currentFlow = "signup";
                title.innerText = "Get Started Now";
                nameField.style.display = "flex";
                policyField.style.display = "flex";
                emailBtn.innerText = "Signup";
                footer.innerHTML = `Already have an account? <span onclick="switchAuthFlowMode('signin')">Sign In</span>`;
            }
        }

        window.toggleAuthGate = function(targetMode) {
            document.querySelectorAll('.tab-trigger-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-interactive-form').forEach(form => form.classList.remove('active'));
            
            if(targetMode === 'email') {
                document.querySelectorAll('.tab-trigger-btn')[0].classList.add('active');
                document.getElementById('emailGatewayForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-trigger-btn')[1].classList.add('active');
                document.getElementById('phoneGatewayForm').classList.add('active');
                initializeRecaptchaModule();
            }
        }

        window.executeGooglePipeline = function() {
            signInWithPopup(auth, provider)
                .then(() => window.location.href = "dashboard.html")
                .catch(() => alert("Use VS Code Live server window."));
        }

        window.executeEmailPipeline = function(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;

            if(currentFlow === "signin") {
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => window.location.href = "dashboard.html")
                    .catch((err) => alert("Sign In Failed: " + err.message));
            } else {
                createUserWithEmailAndPassword(auth, email, password)
                    .then(() => window.location.href = "dashboard.html")
                    .catch((err) => alert("Registration Issue: " + err.message));
            }
        }

        function initializeRecaptchaModule() {
            if(!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            }
        }

        window.executePhonePipeline = function(e) {
            e.preventDefault();
            const executionBtn = document.getElementById('phoneExecutionBtn');

            if (!phoneVerificationToken) {
                const phoneStr = document.getElementById('phoneInput').value;
                const verifier = window.recaptchaVerifier;

                signInWithPhoneNumber(auth, phoneStr, verifier)
                    .then((confirmationResult) => {
                        phoneVerificationToken = confirmationResult;
                        document.getElementById('otpInputGroup').style.display = 'flex';
                        executionBtn.innerText = "Confirm Access Key 🚀";
                    }).catch((error) => { alert("SMS fail: " + error.message); });
            } else {
                const trackingCode = document.getElementById('otpInput').value;
                phoneVerificationToken.confirm(trackingCode)
                    .then(() => window.location.href = "dashboard.html")
                    .catch(() => alert("Token key error."));
            }
        }
    </script>

    <script>
        window.addEventListener('mousemove', (e) => {
            const pupils = document.querySelectorAll('.pupil-dark-dot');
            const faceLayer = document.getElementById('liveFaceLayer');
            
            pupils.forEach((pupil) => {
                const parentBox = pupil.parentElement.getBoundingClientRect();
                const eyeX = parentBox.left + parentBox.width / 2;
                const eyeY = parentBox.top + parentBox.height / 2;
                
                const relativeAngle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const travelDistance = Math.min(8, Math.hypot(e.clientX - eyeX, e.clientY - eyeY) / 32);
                
                const pupilShiftX = Math.cos(relativeAngle) * travelDistance;
                const pupilShiftY = Math.sin(relativeAngle) * travelDistance;
                pupil.style.transform = `translate(${pupilShiftX}px, ${pupilShiftY}px)`;
            });

            if(faceLayer) {
                const bodyContainer = faceLayer.parentElement.getBoundingClientRect();
                const bodyCenterX = bodyContainer.left + bodyContainer.width / 2;
                const bodyCenterY = bodyContainer.top + bodyContainer.height / 2;
                
                const faceShiftX = (e.clientX - bodyCenterX) / 48;
                const faceShiftY = (e.clientY - bodyCenterY) / 52;
                
                faceLayer.style.transform = `translate(${faceShiftX}px, ${faceShiftY}px)`;
            }
        });

        // 🌟 URL Parser: Isse index page se login ya signup mode automatic switch ho jayega!
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            if (mode === 'signin') {
                switchAuthFlowMode('signin');
            } else {
                switchAuthFlowMode('signup');
            }
        });
    </script>
</body>
</html>
